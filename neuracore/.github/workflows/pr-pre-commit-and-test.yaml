name: PR Pre-commit and Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-22.04
    outputs:
      ml: ${{ steps.filter.outputs.ml }}
      non-ml: ${{ steps.filter.outputs.non-ml }}
      deps: ${{ steps.filter.outputs.deps }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3.0.2
        id: filter
        with:
          filters: |
            ml:
              - 'neuracore/ml/**'
              - 'neuracore/core/**'
              - 'tests/unit/ml/**'
              - 'tests/unit/conftest.py'
              - 'neuracore/__init__.py'
            non-ml:
              - 'neuracore/**'
              - '!neuracore/ml/**'
              - 'tests/unit/**'
              - '!tests/unit/ml/**'
            deps:
              - 'setup.py'
            ci:
              - '.github/workflows/pr-pre-commit-and-test.yaml'
              - '.pre-commit-config.yaml'

  pre-commit:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: pre-commit/action@v3.0.1

  test-non-ml:
    needs: [detect-changes, pre-commit]
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.11"]
    env:
      UV_VENV_SEED: "true"
      SHOULD_RUN: ${{ needs.detect-changes.outputs.non-ml == 'true' || needs.detect-changes.outputs.deps == 'true' || needs.detect-changes.outputs.ci == 'true' }}
      SHOULD_RUN_COVERAGE: ${{ matrix.python-version == '3.11' }}
    steps:
      - name: Checkout code
        if: env.SHOULD_RUN == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up uv
        if: env.SHOULD_RUN == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "setup.py"
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        if: env.SHOULD_RUN == 'true'
        run: |
          uv pip install ".[dev,import]"
          if [ "${SHOULD_RUN_COVERAGE}" = "true" ]; then
            uv pip install pytest-cov diff-cover
          fi

      - name: Run non-ML unit tests
        if: env.SHOULD_RUN == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [ "${SHOULD_RUN_COVERAGE}" = "true" ]; then
            uv run pytest tests/unit \
              --ignore=tests/unit/ml \
              --cov=neuracore \
              --junitxml=pytest.xml \
              --cov-report=term-missing:skip-covered \
              --cov-report=xml \
              | tee pytest-coverage.txt
          else
            uv run pytest tests/unit --ignore=tests/unit/ml
          fi

      - name: Generate diff coverage
        if: env.SHOULD_RUN == 'true' && env.SHOULD_RUN_COVERAGE == 'true'
        run: |
          diff-cover coverage.xml \
            --compare-branch=origin/main \
            --exclude neuracore/ml/** \
            --json-report diff-cover.json \
            || true

      - name: Upload coverage artifacts
        if: env.SHOULD_RUN == 'true' && env.SHOULD_RUN_COVERAGE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-artifacts
          path: |
            pytest-coverage.txt
            pytest.xml
            diff-cover.json
            
  test-ml:
    needs: [detect-changes, pre-commit]
    runs-on: ubuntu-22.04
    env:
      UV_VENV_SEED: "true"
      SHOULD_RUN: ${{ needs.detect-changes.outputs.ml == 'true' || needs.detect-changes.outputs.deps == 'true' || needs.detect-changes.outputs.ci == 'true' }}
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - name: Checkout code
        if: env.SHOULD_RUN == 'true'
        uses: actions/checkout@v6

      - name: Set up uv
        if: env.SHOULD_RUN == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "setup.py"
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        if: env.SHOULD_RUN == 'true'
        run: uv pip install ".[dev,ml]" --extra-index-url https://download.pytorch.org/whl/cpu --index-strategy unsafe-best-match

      - name: Run ML unit tests
        if: env.SHOULD_RUN == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: uv run pytest tests/unit/ml -m "not slow"