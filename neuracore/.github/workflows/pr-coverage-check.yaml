name: PR Coverage Comment

on:
  workflow_run:
    workflows: ["PR Pre-commit and Test"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage-comment:
    if: ${{ github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: coverage-artifacts
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Coverage PR Comment
        uses: MishaKav/pytest-coverage-comment@main
        with:
          pytest-coverage-path: pytest-coverage.txt
          junitxml-path: pytest.xml
          report-only-changed-files: true
          xml-skip-covered: true
          issue-number: ${{ github.event.inputs.pr_number }}

      - name: Coverage Change PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')

            const NEW_CODE_THRESHOLD = 50
            const LOW_FILE_THRESHOLD = 25
            const MARKER = "## 🧪 Diff Coverage Report"

            const report = JSON.parse(fs.readFileSync('diff-cover.json', 'utf8'))

            const total = report.total_percent_covered
            const files = report.files || []

            const lowFiles = files.filter(f => f.percent_covered < LOW_FILE_THRESHOLD)

            const coverageBad = total < NEW_CODE_THRESHOLD || lowFiles.length > 0

            const pr = context.payload.workflow_run.pull_requests[0]
            const issue_number = pr.number

            const { owner, repo } = context.repo

            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number
            })

            const existing = comments.data.find(c => c.body.includes(MARKER))

            function negativeComment() {
              let body = `${MARKER}\n\n`
              body += `⚠️ **Coverage requirements not met**\n\n`
              body += `**Coverage of changed lines:** ${total.toFixed(1)}%\n\n`

              if (total < NEW_CODE_THRESHOLD ) {
                body += `Required minimum: **${NEW_CODE_THRESHOLD}%**\n\n`
              }

              if (lowFiles.length > 0) {
                body += `### Files with very low coverage (<${LOW_FILE_THRESHOLD}%)\n\n`
                for (const f of lowFiles) {
                  body += `- \`${f.name}\` — ${f.percent_covered.toFixed(1)}%\n`
                }
                body += `\n`
              }

              body += `Please add tests for the new code.\n`
              return body
            }

            function positiveComment() {
              let body = `${MARKER}\n\n`
              body += `✅ **Coverage has been fixed!**\n\n`
              body += `Coverage of changed lines is now **${total.toFixed(1)}%**.\n\n`
              body += `Great work adding tests 🎉`
              return body
            }

            if (coverageBad) {
              const body = negativeComment()

              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body
                })
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body
                })
              }
            } else {
              if (existing) {
                const body = positiveComment()

                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body
                })
              }
            }
