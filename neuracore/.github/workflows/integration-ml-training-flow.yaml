name: Integration ML Training Flow

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - uses: pre-commit/action@v3.0.1

  test:
    needs: pre-commit
    runs-on: ubuntu-22.04
    strategy:
      # TODO: NDD has socket issue when running in parallel
      #   in CommunicationsManager when calling create_producer_socket()
      max-parallel: 1
      fail-fast: false
      matrix:
        python-version: [ "3.11" ]
        environment: [ staging, production ]

    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Checkout repository metadata
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve latest release tag
        id: release-tag
        run: |
          latest_release_tag="$(git tag --list 'v*' --sort=-v:refname | head -n 1)"
          if [ -z "$latest_release_tag" ]; then
            echo "::error::No release tag matching v* found"
            exit 1
          fi
          echo "latest_release_tag=$latest_release_tag" >> "$GITHUB_OUTPUT"
          echo "Latest release tag: $latest_release_tag"

      - name: Checkout test harness
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.environment == 'production' &&
            steps.release-tag.outputs.latest_release_tag || github.ref_name }}
          fetch-depth: 0
      - name: Pull LFS objects
        run: git lfs pull

      - name: Verify production test harness ref
        if: ${{ matrix.environment == 'production' }}
        run: |
          checked_out_ref="$(git describe --tags --exact-match HEAD)"
          expected_ref="${{ steps.release-tag.outputs.latest_release_tag }}"
          if [ "$checked_out_ref" != "$expected_ref" ]; then
            echo "::error::Expected production test harness ref $expected_ref, got $checked_out_ref"
            exit 1
          fi

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --no-cache-dir --upgrade pip
          pip install --no-cache-dir ".[dev,ml,examples]"

      - name: Resolve test harness
        run: |
          echo "Test harness environment: ${{ matrix.environment }}"
          echo "Test harness ref: ${{ matrix.environment == 'production' && steps.release-tag.outputs.latest_release_tag || github.ref_name }}"
          echo "Test harness commit: $(git rev-parse HEAD)"
          echo "Test harness path: tests/integration/ml/test_training_flow.py"
          python - << 'EOF'
          import neuracore

          print(f"Installed neuracore version: {neuracore.__version__}")
          EOF

      - name: Run Integration Test
        env:
          NEURACORE_API_URL: ${{ matrix.environment == 'staging' &&
            'https://staging.api.neuracore.com/api' ||
            'https://api.neuracore.com/api' }}
          NEURACORE_API_KEY: ${{ matrix.environment == 'staging' &&
            secrets.STAGING_SERVICE_API_KEY || secrets.PROD_SERVICE_API_KEY }}
          NEURACORE_ORG_ID: ${{ matrix.environment == 'staging' &&
            vars.STAGING_SERVICE_ORG_ID || vars.PROD_SERVICE_ORG_ID }}
          NEURACORE_ENDPOINT_TIMEOUT: 30
          DISPLAY: :0
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-utils xvfb libgl1-mesa-dev libgl1-mesa-glx libosmesa6-dev
          Xvfb $DISPLAY -screen 0 1280x1024x24 &
          pytest \
            -o log_cli=true \
            --log-cli-level=INFO \
            --log-cli-format="%(asctime)s %(levelname)-8s [%(name)s] %(message)s" \
            --log-cli-date-format="%H:%M:%S" \
            -v \
            tests/integration/ml/test_training_flow.py
