# VIOLA dataset sources:
# TFDS: https://www.tensorflow.org/datasets/catalog/viola

input_dataset_name: viola
dataset_type: RLDS

output_dataset:
    name: Austin VIOLA
    tags: [franka, kitchen, viola, imitation]
    description: "Franka robot interacting with stylized kitchen tasks, with natural language instructions and workspace + wrist camera observations."

robot:
    name: franka_panda
    urdf_path: "panda.urdf" # URDF file for the Franka Panda robot.
    overwrite_existing: true

# TFDS metadata does not expose an explicit control frequency; 20Hz aligns with the
# corresponding LeRobot conversion metadata.
frequency: 20.0

data_import_config:
    # TODO: Update config for these fields later.
    # natural_language_embedding, terminate_episode, reward, 
    # is_first, is_last and is_terminal.

    RGB_IMAGES:
        source: observation
        format:
            image_convention: CHANNELS_LAST
            order_of_channels: RGB
        mapping:
            - name: agentview_rgb # Fixed third-person scene view.
              source_name: agentview_rgb
            - name: eye_in_hand_rgb # Wrist view for close-range manipulation.
              source_name: eye_in_hand_rgb

    JOINT_POSITIONS:
        source: observation.joint_states
        format:
            angle_units: RADIANS
        mapping:
            - name: panda_joint1 # Franka arm joint order from the dataset.
            - name: panda_joint2
            - name: panda_joint3
            - name: panda_joint4
            - name: panda_joint5
            - name: panda_joint6
            - name: panda_joint7

    PARALLEL_GRIPPER_OPEN_AMOUNTS:
        source: observation.gripper_states
        format:
            normalize:
                min: 0.0 # Closed gripper width, meters.
                max: 0.08 # Open gripper width, meters.
        mapping:
            - name: gripper # Logs current open amount in [0, 1].
              index: 0

    PARALLEL_GRIPPER_TARGET_OPEN_AMOUNTS:
        source: action
        format:
            invert_gripper_amount: true # Source uses inverted convention; Neuracore stores openness.
            normalize:
                min: -1.0 # Fully open command.
                max: 1.0 # Fully closed command.
        mapping:
            - name: gripper # Logs target open amount in [0, 1].
              source_name: gripper_closedness_action

    END_EFFECTOR_POSES:
        source: observation.joint_states
        format:
            ee_pose_input_type: JOINT_POSITIONS
        mapping:
            - name: panda_hand_tcp # Derived by FK; ee_states has leading zero placeholders.

    LANGUAGE:
        source: observation
        format:
            language_type: BYTES
        mapping:
            - name: instruction # Natural-language task goal.
              source_name: natural_language_instruction

    VISUAL_JOINT_POSITIONS:
        source: observation.gripper_states
        format:
            visual_joint_input_type: GRIPPER
            normalize:
                min: 0.0 # Closed gripper width, meters.
                max: 0.08 # Open gripper width, meters.
        mapping:
            - name: panda_finger_joint1
              index: 0
            - name: panda_finger_joint2
              index: 0

    JOINT_TARGET_POSITIONS:
        source: action
        format:
            joint_position_input_type: END_EFFECTOR
            action_type: RELATIVE # Command is a delta from the current TCP pose.
            action_space: END_EFFECTOR # Convert operational-space target to joints by IK.
            pose_type: POSITION_ORIENTATION
            scale_position: 0.1 # Unit action is about 1 cm of TCP motion.
            orientation:
                type: AXIS_ANGLE # Rotation delta is a rotation vector.
                angle_units: RADIANS
                align_frame_roll: 3.14159265
        mapping:
            - name: panda_hand_tcp # Same TCP frame as END_EFFECTOR_POSES.
              pose_position_source_name: world_vector # TCP translation delta.
              pose_orientation_source_name: rotation_delta # TCP rotation delta.
              pose_position_index_range:
                  start: 0
                  end: 3
              pose_orientation_index_range:
                  start: 0
                  end: 3
