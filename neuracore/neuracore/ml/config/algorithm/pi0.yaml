# @package _global_
algorithm:
  _target_: neuracore.ml.algorithms.pi0.pi0.Pi0

  # Pretrained checkpoint (HuggingFace model ID or local directory)
  pretrained_name_or_path: "lerobot/pi0_base"
  use_pretrained_weights: True

  # Model architecture
  paligemma_variant: "gemma_2b"        # VLM backbone size ("gemma_300m" or "gemma_2b")
  action_expert_variant: "gemma_300m"  # Action expert size ("gemma_300m" or "gemma_2b")
  vlm_max_text_tokens: 48             # Maximum number of language tokens
  dtype: "bfloat16"                    # Model precision ("bfloat16" or "float32")

  # Denoising configuration
  num_inference_steps: 10              # Number of Euler denoising steps at inference

  # Flow matching time sampling (Beta distribution parameters)
  time_sampling_beta_alpha: 1.5        # Alpha for beta distribution time sampling
  time_sampling_beta_beta: 1.0         # Beta for beta distribution time sampling
  time_sampling_scale: 0.999           # Scale factor for sampled time values
  time_sampling_offset: 0.001          # Offset added to sampled time values

  # Sinusoidal time embeddings
  min_period: 4e-3                     # Minimum period for sinusoidal time embeddings
  max_period: 4.0                      # Maximum period for sinusoidal time embeddings

  # Optimizer
  optimizer_lr: 2.5e-5                 # Learning rate
  optimizer_betas: [0.9, 0.95]         # Adam beta parameters
  optimizer_eps: 1e-8                  # Adam epsilon
  optimizer_weight_decay: 0.01         # AdamW weight decay
  clip_grad_norm: 1.0                  # Gradient clipping norm

  # LR scheduler
  lr_scheduler_warmup_steps: 1000      # Number of linear warmup steps
  lr_scheduler_num_decay_steps: 30000  # Number of cosine decay steps
  lr_scheduler_decay_lr: 2.5e-6       # Final learning rate after decay

  # Fine-tuning control
  finetune_action_expert_only: False   # Only train action expert parameters
  freeze_language_model_only: True     # Freeze language model, train vision + action

  # Training speed / memory optimizations
  gradient_checkpointing: True         # Saves VRAM (~30% extra compute). Enable if OOM during training.
  compile_model: False                 # JIT-compile model (PyTorch 2.0+). One-time compile overhead on first step.
  compile_mode: "max-autotune"         # "max-autotune" for inference deployments; "default" is safe for training.
