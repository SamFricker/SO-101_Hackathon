# @package _global_
algorithm:
  _target_: neuracore.ml.algorithms.act.act.ACT

  # Transformer architecture
  hidden_dim: 512          # Hidden dimension for transformer layers
  num_encoder_layers: 4    # Number of transformer encoder layers
  num_decoder_layers: 7    # Number of transformer decoder layers
  nheads: 8                # Number of attention heads
  dim_feedforward: 3200    # Feedforward network dimension
  dropout: 0.1             # Dropout probability

  # Latent variable 
  latent_dim: 512          # Dimension of latent variable space
  kl_weight: 10.0          # Weight for KL divergence loss

  # Learning rates
  lr: 1e-4                 # Learning rate for main parameters
  lr_backbone: 1e-5        # Learning rate for image encoder backbone
  weight_decay: 1e-4       # AdamW weight decay

  # Backbone
  freeze_backbone: false   # Whether to freeze image encoder backbone
